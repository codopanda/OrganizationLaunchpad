name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      APP_WORKSPACE: ${{ vars.APP_WORKSPACE || 'web' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Type check web
        run: npm run check -w $APP_WORKSPACE

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      APP_WORKSPACE: ${{ vars.APP_WORKSPACE || 'web' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Run unit tests
        run: npm run test -w $APP_WORKSPACE

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      APP_WORKSPACE: ${{ vars.APP_WORKSPACE || 'web' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: npm run test:e2e -w $APP_WORKSPACE

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    env:
      APP_WORKSPACE: ${{ vars.APP_WORKSPACE || 'web' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Build web
        run: npm run build -w $APP_WORKSPACE
